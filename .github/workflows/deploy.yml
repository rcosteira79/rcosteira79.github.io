name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  share:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Share new posts to Buffer
        env:
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          SITE_URL: https://rcosteira79.github.io
        run: |
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "No previous commit found, skipping share step."
            exit 0
          fi
          NEW_POSTS=$(git diff HEAD~1 HEAD --name-only --diff-filter=A -- src/data/blog/)
          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts in this push."
            exit 0
          fi
          echo "New posts detected:"
          echo "$NEW_POSTS"
          while IFS= read -r post_file; do
            [ -z "$post_file" ] && continue
            node scripts/share-post.mjs "$post_file"
          done <<< "$NEW_POSTS"
